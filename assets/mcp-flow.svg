<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-labelledby="mt md" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
  <title id="mt">flashpaste-mcp tools</title>
  <desc id="md">Sequence diagram showing a terminal agent calling the take_screenshot, read_clipboard, copy_text, and paste_to_pane tools exposed by flashpaste-mcp.</desc>

  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="900" height="280" fill="url(#mbg)"/>

  <text x="40" y="40" fill="#c9d1d9" font-size="18" font-weight="700">flashpaste-mcp · what your agent can call</text>
  <text x="40" y="60" fill="#7d8590" font-size="11">Drop-in MCP server. Claude Code, Codex CLI, Aider, or any MCP client picks it up automatically.</text>

  <!-- two lanes -->
  <g transform="translate(0 110)">
    <!-- Agent box -->
    <rect x="40" y="0" width="180" height="120" rx="12" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="130" y="28" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">terminal agent</text>
    <text x="130" y="48" text-anchor="middle" fill="#7d8590" font-size="10">Claude Code · Codex · Aider</text>
    <circle cx="70" cy="80" r="4" fill="#7ee787">
      <animate attributeName="opacity" values=".3;1;.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="82" y="84" fill="#7d8590" font-size="10">stdio over MCP</text>

    <!-- Arrows + flying packets -->
    <g stroke="#30363d" stroke-width="1.5">
      <line x1="220" y1="30" x2="420" y2="30"/>
      <line x1="220" y1="60" x2="420" y2="60"/>
      <line x1="220" y1="90" x2="420" y2="90"/>
      <line x1="220" y1="120" x2="420" y2="120"/>
    </g>

    <!-- tool packets traveling agent → mcp -->
    <g>
      <circle cx="220" cy="30" r="4" fill="#7ee787" opacity="0">
        <animate attributeName="cx" values="220;420" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="220" cy="60" r="4" fill="#1f6feb" opacity="0">
        <animate attributeName="cx" values="220;420" dur="2.4s" begin=".6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.4s" begin=".6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="220" cy="90" r="4" fill="#d29922" opacity="0">
        <animate attributeName="cx" values="220;420" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="220" cy="120" r="4" fill="#f0883e" opacity="0">
        <animate attributeName="cx" values="220;420" dur="2.4s" begin="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.4s" begin="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- MCP tool list -->
    <g transform="translate(420 -10)">
      <rect x="0" y="0" width="430" height="160" rx="12" fill="#161b22" stroke="#7ee787" stroke-width="1.5"/>
      <text x="20" y="26" fill="#c9d1d9" font-size="13" font-weight="700">flashpaste-mcp</text>
      <text x="20" y="42" fill="#7d8590" font-size="10">4 tools · MIT · stdio transport</text>

      <g font-size="11">
        <text x="20" y="68" fill="#7ee787">▸</text>
        <text x="34" y="68" fill="#c9d1d9" font-weight="600">take_screenshot</text>
        <text x="170" y="68" fill="#7d8590">→ PNG via xdg-portal</text>

        <text x="20" y="88" fill="#1f6feb">▸</text>
        <text x="34" y="88" fill="#c9d1d9" font-weight="600">read_clipboard</text>
        <text x="170" y="88" fill="#7d8590">→ bytes + MIME</text>

        <text x="20" y="108" fill="#d29922">▸</text>
        <text x="34" y="108" fill="#c9d1d9" font-weight="600">copy_text</text>
        <text x="170" y="108" fill="#7d8590">→ stable Wayland owner</text>

        <text x="20" y="128" fill="#f0883e">▸</text>
        <text x="34" y="128" fill="#c9d1d9" font-weight="600">paste_to_pane</text>
        <text x="170" y="128" fill="#7d8590">→ cross-pane via kitty @ send-text</text>
      </g>
    </g>
  </g>
</svg>
