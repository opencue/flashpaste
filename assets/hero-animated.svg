<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="t d" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
  <title id="t">FlashPaste — PrtScr to terminal in 15 milliseconds</title>
  <desc id="d">Animated diagram showing a screenshot leaving the Print Screen key, traveling through a glowing pipe past mutter, kitty and tmux layers, and landing in a Claude Code terminal as an attached image.</desc>

  <defs>
    <!-- backdrop gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <!-- glowing pipe gradient -->
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#1f6feb" stop-opacity="0"/>
      <stop offset=".15" stop-color="#1f6feb" stop-opacity=".55"/>
      <stop offset=".5"  stop-color="#7ee787" stop-opacity=".9"/>
      <stop offset=".85" stop-color="#1f6feb" stop-opacity=".55"/>
      <stop offset="1"   stop-color="#1f6feb" stop-opacity="0"/>
    </linearGradient>
    <!-- screenshot card -->
    <linearGradient id="shot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#30363d"/>
      <stop offset="1" stop-color="#21262d"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#7ee787" stop-opacity=".7"/>
      <stop offset="1" stop-color="#7ee787" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#21262d" stroke-width="1" opacity=".5">
    <path d="M0 90H1200M0 180H1200M0 270H1200"/>
    <path d="M150 0V360M300 0V360M450 0V360M600 0V360M750 0V360M900 0V360M1050 0V360"/>
  </g>

  <!-- ─── LEFT: PrtScr key ─── -->
  <g transform="translate(60 110)">
    <rect width="160" height="140" rx="20" fill="url(#key)" stroke="#30363d" stroke-width="2"/>
    <rect x="8" y="8" width="144" height="124" rx="14" fill="none" stroke="#484f58" stroke-width="1" opacity=".6"/>
    <text x="80" y="64" text-anchor="middle" fill="#c9d1d9" font-size="22" font-weight="700">PrtScr</text>
    <text x="80" y="92" text-anchor="middle" fill="#7d8590" font-size="11">press once</text>
    <!-- pulsing finger-press ring -->
    <circle cx="80" cy="70" r="50" fill="none" stroke="#7ee787" stroke-width="2" opacity="0">
      <animate attributeName="r"       values="40;75;40" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.8;0"   dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ─── MIDDLE: glowing pipe with layer chips ─── -->
  <g transform="translate(240 180)">
    <!-- pipe -->
    <rect x="0" y="-22" width="640" height="44" rx="22" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="-22" width="640" height="44" rx="22" fill="url(#pipe)" opacity=".55">
      <animate attributeName="opacity" values=".35;.75;.35" dur="2.4s" repeatCount="indefinite"/>
    </rect>

    <!-- layer chips above pipe -->
    <g font-size="11" fill="#7d8590" text-anchor="middle">
      <g transform="translate(110 -46)">
        <rect x="-46" y="-14" width="92" height="22" rx="11" fill="#0d1117" stroke="#30363d"/>
        <text y="2" fill="#79c0ff">mutter</text>
      </g>
      <g transform="translate(320 -46)">
        <rect x="-46" y="-14" width="92" height="22" rx="11" fill="#0d1117" stroke="#30363d"/>
        <text y="2" fill="#f0883e">kitty</text>
      </g>
      <g transform="translate(530 -46)">
        <rect x="-46" y="-14" width="92" height="22" rx="11" fill="#0d1117" stroke="#30363d"/>
        <text y="2" fill="#7ee787">tmux</text>
      </g>
    </g>

    <!-- latency caption -->
    <text x="320" y="60" text-anchor="middle" fill="#7d8590" font-size="12">
      <tspan>bash ~120 ms · Rust &lt;40 ms · daemon </tspan><tspan fill="#7ee787" font-weight="700">~15 ms</tspan>
    </text>

    <!-- traveling screenshot card -->
    <g>
      <g transform="translate(0 0)">
        <!-- soft glow -->
        <ellipse cx="0" cy="0" rx="46" ry="22" fill="url(#glow)" filter="url(#soft)" opacity=".9"/>
        <!-- card -->
        <rect x="-30" y="-22" width="60" height="44" rx="6" fill="url(#shot)" stroke="#79c0ff"/>
        <!-- mock screenshot lines -->
        <rect x="-24" y="-16" width="48" height="6" rx="2" fill="#0d1117" opacity=".55"/>
        <rect x="-24" y="-6"  width="34" height="3" rx="1.5" fill="#0d1117" opacity=".4"/>
        <rect x="-24" y="0"   width="40" height="3" rx="1.5" fill="#0d1117" opacity=".4"/>
        <rect x="-24" y="6"   width="28" height="3" rx="1.5" fill="#0d1117" opacity=".4"/>
        <rect x="-24" y="12"  width="44" height="3" rx="1.5" fill="#0d1117" opacity=".4"/>
        <!-- flight along the pipe -->
        <animateTransform attributeName="transform" type="translate"
          values="-30 0; 670 0; 670 0"
          keyTimes="0; 0.55; 1"
          dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity"
          values="0;1;1;1;0;0"
          keyTimes="0;0.05;0.4;0.55;0.6;1"
          dur="2.4s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- ─── RIGHT: terminal window ─── -->
  <g transform="translate(910 70)">
    <!-- window chrome -->
    <rect width="240" height="220" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <rect width="240" height="28" rx="12" fill="#161b22"/>
    <rect y="20" width="240" height="8" fill="#161b22"/>
    <circle cx="14" cy="14" r="5" fill="#f85149"/>
    <circle cx="32" cy="14" r="5" fill="#d29922"/>
    <circle cx="50" cy="14" r="5" fill="#3fb950"/>
    <text x="120" y="18" text-anchor="middle" fill="#7d8590" font-size="11">kitty · tmux · claude</text>

    <!-- terminal body -->
    <g font-size="11" fill="#7d8590">
      <text x="14" y="56"><tspan fill="#7ee787">❯</tspan> <tspan fill="#c9d1d9">claude</tspan></text>
      <text x="14" y="78">analyzing project…</text>

      <!-- prompt line that gains an attachment -->
      <text x="14" y="118"><tspan fill="#7ee787">❯</tspan> <tspan fill="#c9d1d9">explain this screenshot</tspan></text>

      <!-- the attachment card that fades in -->
      <g opacity="0">
        <animate attributeName="opacity"
          values="0;0;0;1;1;1;0"
          keyTimes="0;0.5;0.55;0.6;0.9;0.95;1"
          dur="2.4s" repeatCount="indefinite"/>
        <rect x="14" y="132" width="212" height="60" rx="8" fill="#161b22" stroke="#1f6feb"/>
        <rect x="22" y="140" width="44" height="44" rx="4" fill="url(#shot)"/>
        <rect x="26" y="146" width="36" height="4" rx="2" fill="#0d1117" opacity=".6"/>
        <rect x="26" y="154" width="28" height="3" rx="1.5" fill="#0d1117" opacity=".5"/>
        <rect x="26" y="160" width="32" height="3" rx="1.5" fill="#0d1117" opacity=".5"/>
        <text x="76" y="156" fill="#c9d1d9" font-size="11" font-weight="600">screenshot.png</text>
        <text x="76" y="172" fill="#7d8590" font-size="10">attached · 1.2 MB</text>
        <text x="76" y="186" fill="#7ee787" font-size="10">✓ image received</text>
      </g>

      <!-- caret -->
      <rect x="160" y="108" width="7" height="13" fill="#7ee787">
        <animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ─── bottom caption ─── -->
  <g font-size="14" text-anchor="middle">
    <text x="430" y="328" fill="#c9d1d9" font-weight="700">PrtScr</text>
    <text x="490" y="328" fill="#7d8590">→</text>
    <text x="550" y="328" fill="#c9d1d9">right-click</text>
    <text x="616" y="328" fill="#7d8590">→</text>
    <text x="668" y="328" fill="#c9d1d9" font-weight="700">Paste</text>
    <text x="710" y="328" fill="#7d8590">·</text>
    <text x="810" y="328" fill="#c9d1d9">image attached in</text>
    <text x="910" y="328" fill="#7ee787" font-weight="700">~15 ms</text>
  </g>
</svg>
