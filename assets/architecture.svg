<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="at ad" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
  <title id="at">FlashPaste architecture</title>
  <desc id="ad">Layered architecture showing PrtScr triggering a systemd path unit, the FlashPaste Rust daemon claiming the Wayland selection, and the tmux/kitty binding delivering the paste to the terminal LLM agent.</desc>

  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#7ee787" stop-opacity=".55"/>
      <stop offset="1" stop-color="#7ee787" stop-opacity="0"/>
    </radialGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#7ee787"/>
    </marker>
  </defs>

  <rect width="1000" height="460" fill="url(#abg)"/>

  <!-- title -->
  <text x="40" y="42" fill="#c9d1d9" font-size="20" font-weight="700">How FlashPaste glues five layers</text>
  <text x="40" y="64" fill="#7d8590" font-size="12">Each upstream project stays unchanged — FlashPaste is the wire between them.</text>

  <!-- central hub -->
  <g transform="translate(500 250)">
    <circle r="100" fill="url(#hubGlow)" opacity=".8">
      <animate attributeName="r" values="90;110;90" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="60" fill="#0d1117" stroke="url(#hub)" stroke-width="2.5"/>
    <text text-anchor="middle" y="-6" fill="#c9d1d9" font-size="15" font-weight="700">FlashPaste</text>
    <text text-anchor="middle" y="14" fill="#7ee787" font-size="11">~15 ms daemon</text>
    <text text-anchor="middle" y="30" fill="#7d8590" font-size="10">+ bash · Rust · MCP</text>
  </g>

  <!-- pulse rings travelling from each layer to hub -->
  <g fill="none" stroke="#7ee787" stroke-width="1.4">
    <!-- top-left: mutter (compositor) -->
    <line x1="180" y1="150" x2="440" y2="240" marker-end="url(#ah)" opacity=".55"/>
    <circle r="3" fill="#7ee787" stroke="none">
      <animateMotion path="M180 150 L440 240" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <!-- top-right: kitty (terminal) -->
    <line x1="820" y1="150" x2="560" y2="240" marker-end="url(#ah)" opacity=".55"/>
    <circle r="3" fill="#7ee787" stroke="none">
      <animateMotion path="M820 150 L560 240" dur="2.8s" begin=".7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.8s" begin=".7s" repeatCount="indefinite"/>
    </circle>

    <!-- bottom-left: wl-clipboard / xclip -->
    <line x1="180" y1="360" x2="440" y2="270" marker-end="url(#ah)" opacity=".55"/>
    <circle r="3" fill="#7ee787" stroke="none">
      <animateMotion path="M180 360 L440 270" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- bottom-right: tmux -->
    <line x1="820" y1="360" x2="560" y2="270" marker-end="url(#ah)" opacity=".55"/>
    <circle r="3" fill="#7ee787" stroke="none">
      <animateMotion path="M820 360 L560 270" dur="2.8s" begin="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="2.8s" begin="2.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- layer nodes -->
  <g font-size="12" text-anchor="middle">
    <!-- mutter -->
    <g transform="translate(180 130)">
      <rect x="-90" y="-26" width="180" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text y="-4" fill="#c9d1d9" font-weight="600">mutter</text>
      <text y="14" fill="#7d8590" font-size="10">GNOME compositor · GPL-2.0</text>
    </g>
    <!-- kitty -->
    <g transform="translate(820 130)">
      <rect x="-90" y="-26" width="180" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text y="-4" fill="#c9d1d9" font-weight="600">kitty</text>
      <text y="14" fill="#7d8590" font-size="10">GPU terminal · GPL-3.0</text>
    </g>
    <!-- wl-clipboard / xclip -->
    <g transform="translate(180 380)">
      <rect x="-90" y="-26" width="180" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text y="-4" fill="#c9d1d9" font-weight="600">wl-clipboard + xclip</text>
      <text y="14" fill="#7d8590" font-size="10">selection owners</text>
    </g>
    <!-- tmux -->
    <g transform="translate(820 380)">
      <rect x="-90" y="-26" width="180" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text y="-4" fill="#c9d1d9" font-weight="600">tmux</text>
      <text y="14" fill="#7d8590" font-size="10">multiplexer · ISC</text>
    </g>
  </g>

  <!-- bottom note -->
  <text x="500" y="430" text-anchor="middle" fill="#7d8590" font-size="11">
    flashpaste-mcp also speaks Model Context Protocol → Claude Code, Codex CLI, Aider can drive the clipboard directly.
  </text>
</svg>
