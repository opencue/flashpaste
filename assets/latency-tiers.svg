<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="lt ld" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
  <title id="lt">FlashPaste latency tiers</title>
  <desc id="ld">Three performance tiers shown as animated bars: bash hot path at 120 ms, Rust one-shot under 40 ms, persistent daemon at 15 ms.</desc>

  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950" stop-opacity=".25"/>
      <stop offset="1" stop-color="#d29922"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6feb" stop-opacity=".25"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ee787" stop-opacity=".25"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
  </defs>

  <rect width="900" height="360" fill="url(#lbg)"/>

  <!-- title -->
  <text x="40" y="44" fill="#c9d1d9" font-size="20" font-weight="700">Three progressive tiers</text>
  <text x="40" y="66" fill="#7d8590" font-size="12">FlashPaste auto-promotes you to the fastest available — same UX, same keybind.</text>

  <!-- axis -->
  <g stroke="#30363d" stroke-width="1" font-size="10" fill="#7d8590">
    <line x1="240" y1="300" x2="820" y2="300"/>
    <g text-anchor="middle">
      <line x1="240" y1="296" x2="240" y2="304"/><text x="240" y="320">0</text>
      <line x1="313" y1="296" x2="313" y2="304"/><text x="313" y="320">15 ms</text>
      <line x1="436" y1="296" x2="436" y2="304"/><text x="436" y="320">40 ms</text>
      <line x1="820" y1="296" x2="820" y2="304"/><text x="820" y="320">120 ms</text>
    </g>
  </g>

  <!-- ── Tier 1: bash hot path (slowest, shown first/top) ── -->
  <g transform="translate(0 110)">
    <text x="40"  y="20" fill="#c9d1d9" font-size="13" font-weight="600">Tier 1 · bash</text>
    <text x="40"  y="38" fill="#7d8590" font-size="11">forks wl-copy + xclip on every paste</text>
    <rect x="240" y="0" width="0" height="34" rx="6" fill="url(#bar1)">
      <animate attributeName="width" values="0;580;580;580" keyTimes="0;0.45;0.95;1" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="828" y="22" fill="#d29922" font-size="13" font-weight="700">~120 ms</text>
    <text x="240" y="56" fill="#7d8590" font-size="10">⤷ always works, zero-config fallback</text>
  </g>

  <!-- ── Tier 2: Rust one-shot ── -->
  <g transform="translate(0 180)">
    <text x="40"  y="20" fill="#c9d1d9" font-size="13" font-weight="600">Tier 2 · Rust one-shot</text>
    <text x="40"  y="38" fill="#7d8590" font-size="11">single compiled binary, no shell</text>
    <rect x="240" y="0" width="0" height="34" rx="6" fill="url(#bar2)">
      <animate attributeName="width" values="0;196;196;196" keyTimes="0;0.3;0.95;1" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="444" y="22" fill="#1f6feb" font-size="13" font-weight="700">&lt;40 ms</text>
    <text x="240" y="56" fill="#7d8590" font-size="10">⤷ skips bash startup + 3 wl-clipboard forks</text>
  </g>

  <!-- ── Tier 3: persistent daemon ── -->
  <g transform="translate(0 250)">
    <text x="40"  y="20" fill="#c9d1d9" font-size="13" font-weight="600">Tier 3 · daemon</text>
    <text x="40"  y="38" fill="#7d8590" font-size="11">stable Wayland selection owner</text>
    <rect x="240" y="0" width="0" height="34" rx="6" fill="url(#bar3)">
      <animate attributeName="width" values="0;73;73;73" keyTimes="0;0.18;0.95;1" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="320" y="22" fill="#7ee787" font-size="13" font-weight="700">~15 ms</text>
    <text x="240" y="56" fill="#7d8590" font-size="10">⤷ no fork, no dock spam, no wedge</text>
    <!-- winner trophy hint -->
    <g transform="translate(180 17)">
      <circle r="9" fill="#7ee787" opacity=".15"/>
      <text text-anchor="middle" y="4" font-size="11" fill="#7ee787">★</text>
    </g>
  </g>
</svg>
